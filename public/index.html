<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍽️ 今天吃什么</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    padding: 16px;
    position: relative;
    overflow-x: hidden;
  }

  /* Animated background orbs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    z-index: 0;
    animation: orbFloat 12s ease-in-out infinite alternate;
  }
  body::before {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #f093fb, #f5576c);
    top: -100px; right: -100px;
  }
  body::after {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #4facfe, #00f2fe);
    bottom: -80px; left: -80px;
    animation-delay: -5s;
  }
  @keyframes orbFloat {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -30px) scale(1.15); }
  }

  .container {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 28px;
    padding: 28px 32px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.08);
    max-width: 540px;
    width: 100%;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 900;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }
  .header p {
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    margin-top: 4px;
    font-weight: 500;
  }

  .user-bar {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }
  .user-bar .username { font-weight: 700; color: #f5576c; }
  .user-bar a { color: rgba(255,255,255,0.35); text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .user-bar a:hover { color: #f5576c; }

  /* Grid Marquee - 9-cell rectangular marquee */
  .grid-marquee-wrapper {
    position: relative;
    margin: 0 auto 20px;
    padding: 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.06);
    max-width: 420px;
    aspect-ratio: 1;
    width: 100%;
  }

  .grid-marquee {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: 1fr 1fr 1fr;
    gap: 6px;
    width: 100%;
    height: 100%;
    position: relative;
  }

  .grid-cell {
    border-radius: 14px;
    background: rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    text-align: center;
    transition: all 0.15s ease;
    overflow: hidden;
    padding: 4px;
    border: 1px solid transparent;
    position: relative;
  }
  .grid-cell .cell-emoji { font-size: 28px; line-height: 1.2; }
  .grid-cell .cell-name {
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 90%;
    line-height: 1.2;
    opacity: 0.85;
  }

  /* Center cell - result display */
  .grid-cell.center-cell {
    background: linear-gradient(135deg, rgba(245, 87, 108, 0.15), rgba(240, 147, 251, 0.12));
    border: 1px solid rgba(245, 87, 108, 0.15);
    cursor: default;
    grid-column: 2;
    grid-row: 2;
  }
  .grid-cell.center-cell .cell-emoji { font-size: 36px; }
  .grid-cell.center-cell .cell-name {
    font-size: 13px;
    font-weight: 900;
    max-width: 100%;
    background: linear-gradient(135deg, #f093fb, #f5576c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .grid-cell.preview-cell {
    background: rgba(255,255,255,0.065);
    border: 1px solid rgba(255,255,255,0.06);
  }

  /* Breathing light effect during spin */
  .grid-cell.breathing {
    transition: all 0.08s linear;
  }
  .grid-cell.bright {
    background: rgba(245, 87, 108, 0.25);
    border-color: rgba(245, 87, 108, 0.4);
    box-shadow: 0 0 18px rgba(245, 87, 108, 0.35);
    transform: scale(1.04);
    z-index: 2;
  }
  .grid-cell.bright .cell-emoji {
    filter: brightness(1.3);
  }
  .grid-cell.bright .cell-name {
    opacity: 1;
  }
  .grid-cell.dim {
    background: rgba(255,255,255,0.02);
    border-color: transparent;
    box-shadow: none;
    transform: scale(1);
  }
  .grid-cell.dim .cell-emoji {
    filter: brightness(0.35);
  }
  .grid-cell.dim .cell-name {
    opacity: 0.25;
  }

  /* Winner cell (border glow) */
  .grid-cell.winner-cell {
    animation: winCellPulse 0.8s ease-in-out infinite;
    border-color: rgba(240, 147, 251, 0.6) !important;
    background: rgba(240, 147, 251, 0.12) !important;
  }
  @keyframes winCellPulse {
    0%, 100% {
      box-shadow: 0 0 15px rgba(240, 147, 251, 0.3), inset 0 0 15px rgba(240, 147, 251, 0.05);
    }
    50% {
      box-shadow: 0 0 30px rgba(240, 147, 251, 0.5), inset 0 0 25px rgba(240, 147, 251, 0.1);
    }
  }

  .grid-cell.center-cell.winner-cell {
    box-shadow: 0 0 40px rgba(240, 147, 251, 0.5), inset 0 0 25px rgba(240, 147, 251, 0.1);
  }

  /* Arrows */
  .grid-marquee-arrows {
    display: flex;
    justify-content: center;
    gap: 4px;
    margin-top: 6px;
    height: 6px;
  }
  .grid-marquee-arrows span {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-left: 2px solid rgba(245, 87, 108, 0.5);
    border-top: 2px solid rgba(245, 87, 108, 0.5);
    transform: rotate(135deg);
    animation: arrowBounce 1.5s ease-in-out infinite;
  }
  .grid-marquee-arrows span:nth-child(2) { animation-delay: 0.2s; }
  .grid-marquee-arrows span:nth-child(3) { animation-delay: 0.4s; }
  .grid-marquee-arrows span:nth-child(4) { animation-delay: 0.6s; }
  .grid-marquee-arrows span:nth-child(5) { animation-delay: 0.8s; }

  @keyframes arrowBounce {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 16px 0 12px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Noto Sans SC', sans-serif;
    padding: 12px 32px;
    border: none;
    border-radius: 50px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.25s ease;
    letter-spacing: 0.5px;
  }
  .btn-spin {
    background: linear-gradient(135deg, #f093fb, #f5576c);
    color: white;
    box-shadow: 0 6px 18px rgba(245, 87, 108, 0.35);
  }
  .btn-spin:hover:not(:disabled) {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 10px 24px rgba(245, 87, 108, 0.45);
  }
  .btn-spin:active:not(:disabled) {
    transform: translateY(0) scale(0.98);
  }
  .btn-spin:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }
  .btn-secondary {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255,255,255,0.7);
    padding: 12px 20px;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-secondary:hover {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
  }

  /* Result panel */
  .result-panel {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 20px;
    margin: 0 0 0;
    padding: 8px 16px;
    border-radius: 16px;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,255,255,0.04);
    text-align: center;
    transition: all 0.3s ease;
  }
  .result-panel.highlight {
    background: rgba(245, 87, 108, 0.12);
    border-color: rgba(245, 87, 108, 0.2);
  }

  .result-payer {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s;
  }
  .result-payer .payer-name {
    display: inline-block;
    color: #4facfe;
    font-weight: 700;
    padding: 2px 12px;
    border-radius: 20px;
    background: rgba(79, 172, 254, 0.1);
  }

  /* History + Payers panel */
  .panels {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .panel {
    flex: 1;
    background: rgba(0,0,0,0.15);
    border-radius: 16px;
    padding: 12px;
    border: 1px solid rgba(255,255,255,0.04);
    min-width: 0;
  }
  .panel-title {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-title .action {
    color: rgba(255,255,255,0.2);
    font-size: 11px;
    cursor: pointer;
    transition: color 0.2s;
    text-transform: none;
    letter-spacing: 0;
  }
  .panel-title .action:hover { color: #f5576c; }

  .history-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    max-height: 100px;
    overflow-y: auto;
  }
  .history-list::-webkit-scrollbar { width: 3px; }
  .history-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  .history-item {
    background: rgba(255,255,255,0.05);
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    white-space: nowrap;
  }

  .payer-status {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .payer-chip {
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 500;
    transition: all 0.3s ease;
  }
  .payer-chip.available {
    background: rgba(79, 172, 254, 0.12);
    color: #4facfe;
    border: 1px solid rgba(79, 172, 254, 0.15);
  }
  .payer-chip.picked {
    background: rgba(255,255,255,0.04);
    color: rgba(255,255,255,0.25);
    text-decoration: line-through;
    border: 1px solid transparent;
  }

  /* Celebration canvas */
  #celebrationCanvas {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: none;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
  }

  /* Modals */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: #1a1a2e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: 28px 28px;
    max-width: 460px;
    width: 90%;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.3s ease;
    max-height: 80vh;
    overflow-y: auto;
    color: #fff;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(16px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal::-webkit-scrollbar { width: 3px; }
  .modal::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

  .modal h2 {
    font-size: 18px;
    margin-bottom: 16px;
    color: rgba(255,255,255,0.9);
    text-align: center;
    font-weight: 700;
  }

  /* Edit items styling */
  .edit-item {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .edit-emoji {
    font-size: 20px;
    width: 40px;
    padding: 6px 2px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    cursor: pointer;
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    color: #fff;
    appearance: auto;
    -webkit-appearance: auto;
  }
  .edit-color {
    width: 24px;
    height: 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    flex-shrink: 0;
  }
  .edit-item input[type="text"] {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    background: rgba(255,255,255,0.05);
    color: #fff;
  }
  .edit-item input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
  .edit-item input[type="text"]:focus { border-color: #4facfe; }
  .edit-del {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 8px;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .edit-del:hover { color: #f5576c; background: rgba(245, 87, 108, 0.1); }

  .btn-add {
    width: 100%;
    margin-top: 6px;
    padding: 8px;
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 10px;
    background: transparent;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    font-family: 'Noto Sans SC', sans-serif;
    transition: all 0.2s;
  }
  .btn-add:hover { border-color: #f5576c; color: #f5576c; background: rgba(245, 87, 108, 0.04); }

  .edit-actions {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .edit-actions .btn { flex: 1; padding: 10px; font-size: 14px; }
  .btn-save { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
  .btn-cancel-modal { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6); }
  .btn-cancel-modal:hover { background: rgba(255,255,255,0.1); }

  /* Auth modal */
  .auth-tabs {
    display: flex;
    margin-bottom: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .auth-tab {
    flex: 1;
    text-align: center;
    padding: 8px 0;
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .auth-tab.active { color: #f5576c; border-bottom-color: #f5576c; }
  .auth-field { margin-bottom: 14px; }
  .auth-field label {
    display: block;
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-bottom: 4px;
    font-weight: 500;
  }
  .auth-field input {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'Noto Sans SC', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    background: rgba(255,255,255,0.05);
    color: #fff;
  }
  .auth-field input::placeholder { color: rgba(255,255,255,0.2); }
  .auth-field input:focus { border-color: #f5576c; }
  .auth-error {
    color: #f5576c;
    font-size: 12px;
    text-align: center;
    margin-top: 6px;
    display: none;
  }
  .btn-auth { width: 100%; padding: 12px; border-radius: 50px; font-size: 15px; margin-top: 4px; }

  /* Empty state */
  .empty-state {
    color: rgba(255,255,255,0.2);
    font-size: 11px;
    text-align: center;
    padding: 8px 0;
  }

  @media (max-width: 480px) {
    .container { padding: 20px 16px; border-radius: 20px; }
    .header h1 { font-size: 22px; }
    .header p { font-size: 12px; }
    .grid-marquee-wrapper { max-width: 320px; }
    .grid-cell { gap: 2px; }
    .grid-cell .cell-emoji { font-size: 22px; }
    .grid-cell .cell-name { font-size: 9px; }
    .grid-cell.center-cell .cell-emoji { font-size: 28px; }
    .grid-cell.center-cell .cell-name { font-size: 11px; }
    .btn { padding: 10px 22px; font-size: 14px; }
    .btn-secondary { padding: 10px 16px; font-size: 12px; }
    .modal { padding: 20px 16px; }
    .panels { flex-direction: column; gap: 8px; }
    .result-payer { font-size: 13px; }
  }
</style>
</head>
<body>

<div class="container">
  <!-- User Bar -->
  <div class="user-bar" id="userBar">
    <span id="userDisplay" style="display:none">
      <span class="username" id="userName"></span>
      <span style="color:rgba(255,255,255,0.2)">·</span>
      <a onclick="logout()">退出</a>
      <a onclick="showAuthModal()">切换</a>
    </span>
    <span id="guestDisplay">
      <a onclick="showAuthModal()">登录 / 注册</a>
    </span>
  </div>

  <!-- Header -->
  <div class="header">
    <h1>🍽️ 今天吃什么</h1>
    <p>命运的跑马灯会给你答案</p>
  </div>

  <!-- Grid Marquee / 9-cell rectangular marquee -->
  <div class="grid-marquee-wrapper">
    <div class="grid-marquee" id="gridMarquee">
      <!-- 9 cells: 0-7 are positional, center (index 8) shows result -->
      <div class="grid-cell" data-pos="0"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell" data-pos="1"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell" data-pos="2"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell" data-pos="3"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell center-cell" id="gridCenterCell">
        <span class="cell-emoji">🎰</span>
        <span class="cell-name">转一转</span>
      </div>
      <div class="grid-cell" data-pos="4"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell" data-pos="5"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell" data-pos="6"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
      <div class="grid-cell" data-pos="7"><span class="cell-emoji">🤔</span><span class="cell-name">?</span></div>
    </div>
    <div class="grid-marquee-arrows">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn btn-spin" id="spinBtn">🎰 转一转</button>
    <button class="btn btn-secondary" id="editMenuBtn">✏️ 编辑菜单</button>
    <button class="btn btn-secondary" id="editPayersBtn" style="display:none">👥 结账人</button>
  </div>

  <!-- Result (payer only; food result shows in center cell) -->
  <div class="result-panel" id="resultPanel">
    <div class="result-payer" id="resultPayer"></div>
  </div>

  <!-- Bottom Panels -->
  <div class="panels">
    <div class="panel" id="historyPanel" style="display:none">
      <div class="panel-title">
        <span>📋 历史</span>
        <span class="action" onclick="clearHistory()">清空</span>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
    <div class="panel" id="payerPanel" style="display:none">
      <div class="panel-title">
        <span>💰 结账人</span>
        <span class="action" onclick="openPayersEdit()">编辑</span>
      </div>
      <div class="payer-status" id="payerStatus"></div>
    </div>
  </div>
</div>

<!-- Celebration Canvas -->
<canvas id="celebrationCanvas"></canvas>

<!-- Edit Menu Modal -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal">
    <h2>✏️ 编辑菜单</h2>
    <div id="editList"></div>
    <button class="btn-add" onclick="addMenuItem()">＋ 添加菜品</button>
    <div class="edit-actions">
      <button class="btn btn-cancel-modal" onclick="closeEdit()">取消</button>
      <button class="btn btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>

<!-- Edit Payers Modal -->

<div class="modal-overlay" id="authOverlay">

      <div class="auth-tab active" onclick="switchAuthTab('login')" id="tabLogin">登录</div>

      <div class="auth-field">
        <label>用户名</label>

      </div>
      <div class="auth-field">
        <label>密码</label>

      </div>

      <button class="btn btn-spin btn-auth" id="authBtn" onclick="submitAuth()">登录</button>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  const EMOJI_OPTIONS = ['🥟','🍜','🥗','🍱','🐟','🍗','🍣','🥩','🥘','🍲','🍝','🌮','🌯','🫔','🥪','🧆','🍳','🥓','🍔','🌭','🧁','🍰','🎂','🍨','🍩','🍪','☕','🧋','🥤','🍺','🍷','🥃','🍵','🧃','🍙','🌽','🥨','🥖','🍕','🥐','🫓','🧇','🥞','🫕','🥡','🍛','🍚','🥠','🫘','🧈','🥜','🫐','🍇','🍑','🥝','🍌'];

  function refreshGridPreview() {
    // Show first 8 items (or fewer) in the 8 grid cells as a preview
    if (items.length === 0) {
      cells.forEach(cell => {
        cell.querySelector('.cell-emoji').textContent = '🤔';
        cell.querySelector('.cell-name').textContent = '?';
      });
      return;
    }
    const count = items.length;
    const startIdx = Math.floor(Math.random() * count);
    cells.forEach((cell, pos) => {
      const idx = (startIdx + pos) % count;
      cell.querySelector('.cell-emoji').textContent = emojis[idx % emojis.length];
      const nameEl = cell.querySelector('.cell-name');
      nameEl.textContent = items[idx];
      nameEl.style.color = colors[idx % colors.length];
    });
  }

  // ---- State ----
  let items = ['麻辣烫','牛肉面','轻食沙拉','日料定食','酸菜鱼','黄焖鸡','螺蛳粉','广式茶点'];
  let colors = ['#FF6B6B','#4ECDC4','#FFB347','#5B86E5','#A68CDE','#F7DC6F','#82CCDD','#E56B9D'];
  let emojis = ['🥟','🍜','🥗','🍱','🐟','🍗','🍣','🥩'];
  let history = [];
  let payerNames = [];
  let payerPool = [];
  let payerHistory = [];

  let token = localStorage.getItem('lunchToken');
  let username = '';
  let authMode = 'login';
  let spinning = false;

  // ---- Grid Marquee / breathing light (chaser) effect ----
  const grid = document.getElementById('gridMarquee');
  const centerCell = document.getElementById('gridCenterCell');
  const cells = grid.querySelectorAll('.grid-cell[data-pos]');
  let gridAnimId = null;
  let gridTargetItemIdx = -1;

  // Chaser path order: clockwise around the 8 perimeter cells
  // 0→1→2→3→4→5→6→7 → 0
  // Visual positions:
  // 0: top-left,   1: top-center,   2: top-right
  // 7: middle-left,                 3: middle-right
  // 6: bottom-left,5: bottom-center,4: bottom-right
  const CHASER_ORDER = [0, 1, 2, 3, 4, 5, 6, 7];

  function resetGridPreview() {
    if (items.length === 0) {
      cells.forEach(cell => {
        cell.querySelector('.cell-emoji').textContent = '🤔';
        cell.querySelector('.cell-name').textContent = '?';
        cell.classList.remove('bright', 'dim', 'winner-cell', 'breathing');
        cell.classList.add('breathing');
      });
      return;
    }
    fillGridCells();
    cells.forEach(c => c.classList.remove('bright', 'dim', 'winner-cell'));
    cells.forEach(c => c.classList.add('breathing'));
    centerCell.querySelector('.cell-emoji').textContent = '🎰';
    centerCell.querySelector('.cell-name').textContent = '转一转';
    centerCell.querySelector('.cell-emoji').style = '';
    centerCell.querySelector('.cell-name').style = '';
    centerCell.classList.remove('winner-cell');
  }

  // Fill perimeter cells with items, ensuring all items are unique & shift-rotated
  function fillGridCells() {
    const count = items.length;
    const offset = Math.floor(Math.random() * count);
    // assign 8 distinct items to 8 perimeter positions (wrap around if count<8)
    cells.forEach((cell, pos) => {
      const idx = (offset + pos) % count;
      cell.querySelector('.cell-emoji').textContent = emojis[idx % emojis.length];
      const nameEl = cell.querySelector('.cell-name');
      nameEl.textContent = items[idx];
      nameEl.style.color = colors[idx % colors.length];
      // store the item index so we can look it up later
      cell.dataset.itemIdx = idx;
    });
  }

  function startGridMarquee() {
    if (gridAnimId) cancelAnimationFrame(gridAnimId);
    if (items.length < 2) return;

    // Reset
    cells.forEach(c => c.classList.remove('bright', 'winner-cell'));
    cells.forEach(c => c.classList.add('breathing'));
    centerCell.classList.remove('winner-cell');
    centerCell.querySelector('.cell-emoji').textContent = '🌀';
    centerCell.querySelector('.cell-name').textContent = '转动中...';
    centerCell.querySelector('.cell-emoji').style = '';
    centerCell.querySelector('.cell-name').style = '';
    document.getElementById('resultPanel').classList.remove('highlight');
    document.getElementById('resultPayer').innerHTML = '';

    // Fill cells with shuffled items (same layout throughout the animation)
    fillGridCells();

    const count = items.length;
    // Pick a random target item index
    gridTargetItemIdx = Math.floor(Math.random() * count);

    const totalCycles = 5 + Math.floor(Math.random() * 3); // 5-7 full cycles
    const totalFlashes = totalCycles * 8;

    const flashDuration = 8000 + Math.random() * 2000; // 8-10 seconds
    const startTime = performance.now();
    let lastFlashIdx = -1;

    // The chaser will go around the 8 cells.
    // For the target item: we find which cell position it's in, then
    // stop the chaser exactly on that cell.
    // We can simply spin the chaser for N full cycles, then stop.
    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / flashDuration, 1);

      // Ease out cubic for gradual slowdown
      const eased = 1 - Math.pow(1 - progress, 3);
      const totalSteps = totalFlashes - 1;
      const step = Math.min(Math.floor(eased * totalSteps), totalSteps);

      if (step !== lastFlashIdx) {
        lastFlashIdx = step;

        const brightPos = step % 8;

        cells.forEach((cell, pos) => {
          if (pos === brightPos) {
            cell.classList.remove('dim');
            cell.classList.add('bright');
            // Show the currently highlighted item in the center
            const itemIdx = parseInt(cell.dataset.itemIdx);
            centerCell.querySelector('.cell-emoji').textContent = emojis[itemIdx % emojis.length];
            centerCell.querySelector('.cell-name').textContent = items[itemIdx];
            centerCell.querySelector('.cell-name').style.color = colors[itemIdx % colors.length];
          } else {
            cell.classList.remove('bright');
            cell.classList.add('dim');
          }
        });
      }

      if (progress < 1) {
        gridAnimId = requestAnimationFrame(animate);
      } else {
        // Final flash: find which cell has our target item
        let targetPos = -1;
        cells.forEach((cell, pos) => {
          if (parseInt(cell.dataset.itemIdx) === gridTargetItemIdx) {
            targetPos = pos;
          }
        });

        // Ensure last flash is on the target cell
        if (targetPos >= 0) {
          cells.forEach((cell, pos) => {
            if (pos === targetPos) {
              cell.classList.remove('dim');
              cell.classList.add('bright');
            } else {
              cell.classList.remove('bright');
              cell.classList.add('dim');
            }
          });
        }

        gridAnimId = null;
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
        document.getElementById('spinBtn').textContent = '🎰 转一转';

        setTimeout(() => showGridResult(gridTargetItemIdx), 300);
      }
    }

    gridAnimId = requestAnimationFrame(animate);
  }

  function showGridResult(idx) {
    // Update center cell with winner
    centerCell.classList.add('winner-cell');
    centerCell.querySelector('.cell-emoji').textContent = emojis[idx % emojis.length];
    const nameEl = centerCell.querySelector('.cell-name');
    nameEl.textContent = '今天吃 ' + items[idx] + ' 🎉';
    nameEl.style.color = colors[idx % colors.length];
    nameEl.style['-webkit-text-fill-color'] = colors[idx % colors.length];
    nameEl.style['background-clip'] = 'unset';
    nameEl.style['-webkit-background-clip'] = 'unset';
    nameEl.style.background = 'none';

    // Also highlight the border position where it landed
    document.getElementById('resultPanel').classList.add('highlight');

    // Pick payer
    (async () => {
      try {
        const pick = await api('/api/payers/pick', 'POST');
        payerPool = pick.remainingPool;
        payerHistory = pick.pickedHistory;
        const pickedName = pick.picked;
        document.getElementById('resultPayer').innerHTML = '💰 今日结账：<span class="payer-name">' + pickedName + '</span>';
        renderPayerStatus();
      } catch(e) {
        document.getElementById('resultPayer').innerHTML = '';
      }
    })();

    startCelebration();

    // Save history
    (async () => {
      try {
        await api('/api/history', 'POST', { item: items[idx] });
        const d = new Date();
        const ds = d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
        const ts = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        history.unshift({ item: items[idx], time: ds + ' ' + ts });
        renderHistory();
      } catch(e) {
        console.error('save history failed:', e);
      }
    })();
  }

  // ---- API helpers ----
  function apiHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' };
  }
  async function api(path, method, body) {
    const opts = { method, headers: apiHeaders() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '请求失败');
    return data;
  }

  // ---- Auth ----
  function showAuthModal() { document.getElementById('authOverlay').classList.add('active'); }
  function hideAuthModal() { document.getElementById('authOverlay').classList.remove('active'); }
  function showAuthError(msg) { const e = document.getElementById('authError'); e.textContent = msg; e.style.display = 'block'; }
  function hideAuthError() { document.getElementById('authError').style.display = 'none'; }

  function switchAuthTab(mode) {
    authMode = mode;
    document.getElementById('tabLogin').className = 'auth-tab' + (mode==='login'?' active':'');
    document.getElementById('tabRegister').className = 'auth-tab' + (mode==='register'?' active':'');
    document.getElementById('authBtn').textContent = mode==='login'?'登录':'注册';
    hideAuthError();
  }

  async function submitAuth() {
    const u = document.getElementById('authUsername').value.trim();
    const p = document.getElementById('authPassword').value;
    if (!u||!p) { showAuthError('请填写用户名和密码'); return; }
    const btn = document.getElementById('authBtn');
    btn.disabled = true;
    btn.textContent = authMode==='login'?'登录中...':'注册中...';
    hideAuthError();
    try {
      const data = await api('/api/'+authMode, 'POST', { username: u, password: p });
      token = data.token;
      username = data.username;
      localStorage.setItem('lunchToken', token);
      hideAuthModal();
      document.getElementById('authUsername').value = '';
      document.getElementById('authPassword').value = '';
      await loadUserData();
      updateUserBar();
    } catch(e) {
      showAuthError(e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = authMode==='login'?'登录':'注册';
    }
  }

  function logout() {
    token = null;
    username = '';
    localStorage.removeItem('lunchToken');
    updateUserBar();
    items = ['麻辣烫','牛肉面','轻食沙拉','日料定食','酸菜鱼','黄焖鸡','螺蛳粉','广式茶点'];
    colors = ['#FF6B6B','#4ECDC4','#FFB347','#5B86E5','#A68CDE','#F7DC6F','#82CCDD','#E56B9D'];
    emojis = ['🥟','🍜','🥗','🍱','🐟','🍗','🍣','🥩'];
    history = [];
    payerNames = [];
    payerPool = [];
    payerHistory = [];
    if (gridAnimId) cancelAnimationFrame(gridAnimId);
    cells.forEach(c => c.classList.remove('spinning-cell', 'winner-cell', 'bright', 'dim'));
    centerCell.classList.remove('winner-cell');
    centerCell.querySelector('.cell-emoji').textContent = '🤔';
    centerCell.querySelector('.cell-name').textContent = '登录后转转';
    centerCell.querySelector('.cell-emoji').style = '';
    centerCell.querySelector('.cell-name').style = '';
    document.getElementById('resultPanel').classList.remove('highlight');
    document.getElementById('resultPayer').innerHTML = '';
    refreshGridPreview();
    document.getElementById('historyPanel').style.display = 'none';
    document.getElementById('payerPanel').style.display = 'none';
  }

  function updateUserBar() {
    document.getElementById('userDisplay').style.display = token ? 'inline' : 'none';
    document.getElementById('guestDisplay').style.display = token ? 'none' : 'inline';
    document.getElementById('userName').textContent = username;
  }

  function requireAuth(fn) {
    return function() {
      if (!token) { showAuthModal(); return; }
      return fn.apply(this, arguments);
    };
  }

  // ---- Bind buttons ----
  (function() {
    document.getElementById('spinBtn').onclick = function() { requireAuth(spin)(); };
    document.getElementById('editMenuBtn').onclick = function() { requireAuth(openEdit)(); };
    document.getElementById('editPayersBtn').onclick = function() { requireAuth(openPayersEdit)(); };
  })();

  // ---- User data loading ----
  async function loadUserData() {
    try {
      const [m, h] = await Promise.all([
        api('/api/menu', 'GET'),
        api('/api/history', 'GET')
      ]);
      items = m.items;
      colors = m.colors;
      emojis = m.emojis;
      history = h.map(r => ({ item: r.item, time: r.created_at }));

      // Load payers
      try {
        const p = await api('/api/payers', 'GET');
        payerNames = p.names;
        payerPool = p.currentPool;
        payerHistory = p.pickedHistory || [];
      } catch(e) {
        payerNames = ['小明','小红','小张','小李'];
        payerPool = [...payerNames];
        payerHistory = [];
      }

      refreshGridPreview();
      centerCell.querySelector('.cell-emoji').textContent = '🎰';
      centerCell.querySelector('.cell-name').textContent = '转一转';
      centerCell.querySelector('.cell-emoji').style = '';
      centerCell.querySelector('.cell-name').style = '';
      centerCell.classList.remove('winner-cell');
      document.getElementById('editPayersBtn').style.display = 'inline-block';
      renderHistory();
      renderPayerStatus();
    } catch(e) {
      console.error('Failed to load:', e);
    }
  }

  // ---- Spin ----
  function spin() {
    if (spinning || items.length < 2) return;
    spinning = true;
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    btn.textContent = '🌀 转动中...';
    startGridMarquee();
  }

  // ---- Edit Menu ----
  function openEdit() {
    const overlay = document.getElementById('editOverlay');
    const list = document.getElementById('editList');
    list.innerHTML = '';
    items.forEach((item, i) => {
      const div = document.createElement('div');
      div.className = 'edit-item';

      const es = document.createElement('select');
      es.className = 'edit-emoji';
      EMOJI_OPTIONS.forEach(e => {
        const o = document.createElement('option');
        o.value = e;
        o.textContent = e;
        if (e === emojis[i % emojis.length]) o.selected = true;
        es.appendChild(o);
      });

      const ci = document.createElement('input');
      ci.type = 'color';
      ci.className = 'edit-color';
      ci.value = colors[i];

      const ti = document.createElement('input');
      ti.type = 'text';
      ti.value = item;
      ti.placeholder = '输入菜名...';

      div.appendChild(es);
      div.appendChild(ci);
      div.appendChild(ti);
      list.appendChild(div);
    });
    overlay.classList.add('active');
  }

  function closeEdit() {
    document.getElementById('editOverlay').classList.remove('active');
  }

  function addMenuItem() {
    const list = document.getElementById('editList');
    const div = document.createElement('div');
    div.className = 'edit-item';

    const es = document.createElement('select');
    es.className = 'edit-emoji';
    EMOJI_OPTIONS.forEach(e => {
      const o = document.createElement('option');
      o.value = e;
      o.textContent = e;
      es.appendChild(o);
    });

    const ci = document.createElement('input');
    ci.type = 'color';
    ci.className = 'edit-color';
    ci.value = '#' + Math.floor(Math.random() * 0xffffff).toString(16).padStart(6, '0');

    const ti = document.createElement('input');
    ti.type = 'text';
    ti.value = '';
    ti.placeholder = '输入菜名...';

    const db = document.createElement('button');
    db.textContent = '✕';
    db.className = 'edit-del';
    db.onclick = () => div.remove();

    div.appendChild(es);
    div.appendChild(ci);
    div.appendChild(ti);
    div.appendChild(db);
    list.appendChild(div);
    ti.focus();
  }

  async function saveEdit() {
    const tis = document.querySelectorAll('#editList input[type="text"]');
    const cis = document.querySelectorAll('#editList input[type="color"]');
    const ess = document.querySelectorAll('#editList select.edit-emoji');

    const ni = [], nc = [], ne = [];
    tis.forEach((inp, i) => {
      const v = inp.value.trim();
      if (v) {
        ni.push(v);
        nc.push(cis[i].value);
        ne.push(ess[i].value);
      }
    });

    if (ni.length < 2) { alert('至少需要 2 个菜品！'); return; }

    try {
      await api('/api/menu', 'PUT', { items: ni, colors: nc, emojis: ne });
      items = ni;
      colors = nc;
      emojis = ne;
      refreshGridPreview();
      centerCell.querySelector('.cell-emoji').textContent = '🎰';
      centerCell.querySelector('.cell-name').textContent = '已更新';
      centerCell.querySelector('.cell-emoji').style = '';
      centerCell.querySelector('.cell-name').style = '';
      centerCell.classList.remove('winner-cell');
      document.getElementById('resultPanel').classList.remove('highlight');
      document.getElementById('resultPayer').innerHTML = '';
      closeEdit();
    } catch(e) {
      alert('保存失败：' + e.message);
    }
  }

  // ---- Edit Payers ----
  function openPayersEdit() {
    const list = document.getElementById('payersEditList');
    list.innerHTML = '';
    (payerNames.length > 0 ? payerNames : ['小明','小红','小张','小李']).forEach(name => {
      const div = document.createElement('div');
      div.className = 'edit-item';
      const ti = document.createElement('input');
      ti.type = 'text';
      ti.value = name;
      ti.placeholder = '输入姓名...';
      div.appendChild(ti);
      list.appendChild(div);
    });
    document.getElementById('payersOverlay').classList.add('active');
  }

  function closePayersEdit() {
    document.getElementById('payersOverlay').classList.remove('active');
  }

  function addPayerItem() {
    const list = document.getElementById('payersEditList');
    const div = document.createElement('div');
    div.className = 'edit-item';
    const ti = document.createElement('input');
    ti.type = 'text';
    ti.value = '';
    ti.placeholder = '输入姓名...';
    const db = document.createElement('button');
    db.textContent = '✕';
    db.className = 'edit-del';
    db.onclick = () => div.remove();
    div.appendChild(ti);
    div.appendChild(db);
    list.appendChild(div);
    ti.focus();
  }

  async function savePayers() {
    const tis = document.querySelectorAll('#payersEditList input[type="text"]');
    const names = [];
    tis.forEach(inp => {
      const v = inp.value.trim();
      if (v) names.push(v);
    });
    if (names.length < 2) { alert('至少需要 2 位结账人！'); return; }

    try {
      await api('/api/payers', 'PUT', { names });
      payerNames = names;
      payerPool = [...names];
      payerHistory = [];
      renderPayerStatus();
      closePayersEdit();
    } catch(e) {
      alert('保存失败：' + e.message);
    }
  }

  // ---- Render helpers ----
  function renderHistory() {
    const section = document.getElementById('historyPanel');
    const list = document.getElementById('historyList');
    if (history.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    list.innerHTML = '';
    history.forEach(h => {
      const d = document.createElement('div');
      d.className = 'history-item';
      d.textContent = h.time + ' ' + h.item;
      list.appendChild(d);
    });
  }

  function renderPayerStatus() {
    const section = document.getElementById('payerPanel');
    const status = document.getElementById('payerStatus');
    if (!payerNames || payerNames.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = 'block';
    status.innerHTML = '';
    payerNames.forEach(name => {
      const chip = document.createElement('span');
      chip.className = 'payer-chip';
      if (payerPool.includes(name)) {
        chip.classList.add('available');
        chip.textContent = name;
      } else {
        chip.classList.add('picked');
        chip.textContent = name + ' ✓';
      }
      status.appendChild(chip);
    });
  }

  async function clearHistory() {
    if (!confirm('确定清空所有抽签记录？')) return;
    try {
      await api('/api/history', 'DELETE');
      history = [];
      renderHistory();
    } catch(e) {
      alert('清空失败');
    }
  }

  // ---- Celebration canvas ----
  const cC = document.getElementById('celebrationCanvas');
  const cCtx = cC.getContext('2d');
  let cA = null, cP = [];
  const DPR = window.devicePixelRatio || 1;

  function resizeC() {
    cC.width = window.innerWidth * DPR;
    cC.height = window.innerHeight * DPR;
    cCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resizeC);

  function createFW(x, y) {
    const cs = ['#FF6B6B','#FFB347','#4ECDC4','#5B86E5','#A68CDE','#F7DC6F','#E56B9D','#FF9A9E'];
    for (let i = 0; i < 30 + Math.random() * 20; i++) {
      const a = (Math.PI * 2 * i) / (30 + Math.random() * 20) + (Math.random() - 0.5) * 0.3;
      const s = 2 + Math.random() * 4;
      cP.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 1,
        decay: 0.012 + Math.random() * 0.015,
        size: 3 + Math.random() * 4,
        color: cs[Math.floor(Math.random() * cs.length)],
        type: 'firework'
      });
    }
  }

  function createConf() {
    const cs = ['#FF6B6B','#4ECDC4','#FFB347','#5B86E5','#A68CDE','#F7DC6F','#E56B9D','#FF9A9E'];
    for (let i = 0; i < 40; i++) {
      cP.push({
        x: Math.random() * (cC.width / DPR),
        y: -Math.random() * 100,
        vx: (Math.random() - 0.5) * 2,
        vy: 1 + Math.random() * 3,
        life: 1,
        decay: 0.005 + Math.random() * 0.008,
        size: 6 + Math.random() * 6,
        color: cs[Math.floor(Math.random() * cs.length)],
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.1,
        type: 'confetti'
      });
    }
  }

  function animC() {
    const w = cC.width / DPR, h = cC.height / DPR;
    cCtx.clearRect(0, 0, w, h);
    for (let i = cP.length - 1; i >= 0; i--) {
      const p = cP[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.04;
      p.life -= p.decay;
      if (p.type === 'confetti') p.rotation += p.rotSpeed;
      if (p.life <= 0) { cP.splice(i, 1); continue; }
      cCtx.globalAlpha = Math.max(0, p.life);
      if (p.type === 'firework') {
        cCtx.beginPath();
        cCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
        cCtx.fillStyle = p.color;
        cCtx.fill();
      } else if (p.type === 'confetti') {
        cCtx.save();
        cCtx.translate(p.x, p.y);
        cCtx.rotate(p.rotation);
        cCtx.fillStyle = p.color;
        cCtx.fillRect(-p.size / 2, -3, p.size, 6);
        cCtx.restore();
      }
    }
    cCtx.globalAlpha = 1;
    if (cP.length > 0) {
      cA = requestAnimationFrame(animC);
    } else {
      cC.style.display = 'none';
    }
  }

  function startCelebration() {
    if (cA) cancelAnimationFrame(cA);
    cC.style.display = 'block';
    resizeC();
    createFW(Math.random() * (cC.width / DPR), Math.random() * (cC.height / DPR) * 0.6);
    createConf();
    createConf();
    cA = requestAnimationFrame(animC);
    setTimeout(() => {
      createFW(Math.random() * (cC.width / DPR), Math.random() * (cC.height / DPR) * 0.6);
    }, 400);
    setTimeout(() => {
      createFW(Math.random() * (cC.width / DPR), Math.random() * (cC.height / DPR) * 0.6);
    }, 800);
  }

  // ---- Init ----
  // If token exists, restore session
  (async function init() {
    if (token) {
      try {
        const me = await api('/api/me', 'GET');
        username = me.username;
        updateUserBar();
        await loadUserData();
      } catch(e) {
        token = null;
        localStorage.removeItem('lunchToken');
        updateUserBar();
      }
    }
    refreshGridPreview();
    updateUserBar();
  })();
</script>
</body>
</html>
