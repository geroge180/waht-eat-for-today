<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍽️ 今天吃什么</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 50%, #ff9a9e 100%);
    background-size: 400% 400%;
    animation: gradientShift 15s ease infinite;
    padding: 20px;
  }
  @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .container {
    background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-radius: 32px; padding: 40px 48px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 1px 2px rgba(255, 255, 255, 0.6);
    max-width: 780px; width: 100%; border: 1px solid rgba(255, 255, 255, 0.4);
  }
  .header { text-align: center; margin-bottom: 36px; }
  .header h1 {
    font-size: 32px; font-weight: 900;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 2px;
  }
  .header p { color: #888; font-size: 14px; margin-top: 6px; font-weight: 500; }
  .user-bar { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 13px; color: #999; }
  .user-bar .username { font-weight: 700; color: #f5576c; }
  .user-bar a { color: #bbb; text-decoration: none; cursor: pointer; }
  .user-bar a:hover { color: #f5576c; }
  .wheel-wrapper { position: relative; display: flex; justify-content: center; margin-bottom: 20px; }
  .pointer {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%); z-index: 20;
    width: 0; height: 0;
    border-left: 18px solid transparent; border-right: 18px solid transparent; border-top: 30px solid #f5576c;
    filter: drop-shadow(0 4px 8px rgba(245, 87, 108, 0.5));
  }
  .pointer::after {
    content: ''; position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
    width: 14px; height: 14px; background: #f5576c; border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.8);
  }
  #wheel {
    width: 340px; height: 340px; border-radius: 50%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06); display: block;
  }
  #wheel:hover { box-shadow: 0 12px 40px rgba(0, 0, 0, 0.18), 0 2px 8px rgba(0, 0, 0, 0.08); }
  #celebrationCanvas { position: fixed; inset: 0; z-index: 80; display: none; width: 100vw; height: 100vh; pointer-events: none; }
  .controls { display: flex; justify-content: center; gap: 16px; margin: 24px 0 16px; flex-wrap: wrap; }
  .btn {
    font-family: 'Noto Sans SC', sans-serif; padding: 14px 40px; border: none; border-radius: 50px;
    font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.25s ease; letter-spacing: 1px;
  }
  .btn-spin { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; box-shadow: 0 8px 20px rgba(245, 87, 108, 0.35); }
  .btn-spin:hover:not(:disabled) { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 28px rgba(245, 87, 108, 0.45); }
  .btn-spin:active:not(:disabled) { transform: translateY(0) scale(0.98); }
  .btn-spin:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .btn-edit { background: rgba(0, 0, 0, 0.08); color: #555; padding: 14px 24px; font-size: 15px; }
  .btn-edit:hover { background: rgba(0, 0, 0, 0.14); color: #333; }
  .result { text-align: center; min-height: 56px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .result-text { font-size: 26px; font-weight: 900; color: #333; opacity: 0; transform: translateY(10px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .result-text.show { opacity: 1; transform: translateY(0); }
  .result-emoji { font-size: 40px; display: block; margin-bottom: 4px; }
  .history-section { margin-top: 24px; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 20px; }
  .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .history-header h3 { font-size: 14px; color: #999; font-weight: 500; }
  .btn-clear { background: none; border: none; color: #ccc; font-size: 12px; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; padding: 4px 8px; border-radius: 6px; transition: all 0.2s; }
  .btn-clear:hover { color: #f5576c; background: rgba(245, 87, 108, 0.08); }
  .history-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .history-item { background: rgba(0,0,0,0.05); padding: 6px 14px; border-radius: 20px; font-size: 13px; color: #666; font-weight: 500; }
  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 100;
    justify-content: center; align-items: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: white; border-radius: 24px; padding: 32px 36px;
    max-width: 460px; width: 90%; box-shadow: 0 30px 60px rgba(0,0,0,0.25);
    animation: modalIn 0.3s ease; max-height: 80vh; overflow-y: auto;
  }
  @keyframes modalIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .modal h2 { font-size: 20px; margin-bottom: 20px; color: #333; text-align: center; }
  .edit-emoji { font-size: 22px; width: 44px; padding: 6px 2px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; flex-shrink: 0; background: white; appearance: auto; -webkit-appearance: auto; }
  .edit-del { background: none; border: none; color: #ccc; font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: all 0.2s; flex-shrink: 0; }
  .edit-del:hover { color: #f5576c; background: rgba(245, 87, 108, 0.1); }
  .btn-add { width: 100%; margin-top: 8px; padding: 10px; border: 2px dashed #ddd; border-radius: 12px; background: transparent; font-size: 14px; color: #999; cursor: pointer; font-family: 'Noto Sans SC', sans-serif; transition: all 0.2s; }
  .btn-add:hover { border-color: #f5576c; color: #f5576c; background: rgba(245, 87, 108, 0.04); }
  .edit-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .edit-color { width: 28px; height: 28px; border-radius: 8px; border: none; cursor: pointer; flex-shrink: 0; }
  .edit-item input[type="text"] { flex: 1; padding: 10px 14px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; font-family: 'Noto Sans SC', sans-serif; outline: none; transition: border-color 0.2s; }
  .edit-item input[type="text"]:focus { border-color: #f5576c; }
  .edit-actions { display: flex; gap: 12px; margin-top: 20px; }
  .edit-actions .btn { flex: 1; padding: 12px; font-size: 15px; }
  .btn-save { background: linear-gradient(135deg, #f093fb, #f5576c); color: white; }
  .btn-cancel-modal { background: rgba(0,0,0,0.06); color: #666; }
  .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
  .auth-tab { flex: 1; text-align: center; padding: 10px 0; font-size: 15px; font-weight: 600; color: #bbb; cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; margin-bottom: -2px; }
  .auth-tab.active { color: #f5576c; border-bottom-color: #f5576c; }
  .auth-field { margin-bottom: 16px; }
  .auth-field label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; font-weight: 500; }
  .auth-field input { width: 100%; padding: 12px 16px; border: 2px solid #eee; border-radius: 12px; font-size: 15px; font-family: 'Noto Sans SC', sans-serif; outline: none; transition: border-color 0.2s; }
  .auth-field input:focus { border-color: #f5576c; }
  .auth-error { color: #f5576c; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
  .btn-auth { width: 100%; padding: 14px; border-radius: 50px; font-size: 16px; margin-top: 8px; }
  @media (max-width: 520px) {
    .container { padding: 24px 20px; } #wheel { width: 280px; height: 280px; } .header h1 { font-size: 26px; }
    .btn { padding: 12px 28px; font-size: 16px; } .modal { padding: 24px 20px; } .edit-emoji { width: 38px; font-size: 18px; }
  }
  @media (max-width: 380px) {
    #wheel { width: 240px; height: 240px; } .container { padding: 16px 12px; border-radius: 24px; }
    .header h1 { font-size: 22px; } .header p { font-size: 12px; } .btn { padding: 10px 20px; font-size: 14px; }
    .edit-item { flex-wrap: wrap; gap: 6px; } .edit-item input[type="text"] { min-width: 120px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="user-bar" id="userBar">
    <span id="userDisplay" style="display:none"><span class="username" id="userName"></span> · <a onclick="logout()">退出</a> <a onclick="showAuthModal()">切换账号</a></span>
    <span id="guestDisplay"><a onclick="showAuthModal()">登录 / 注册</a></span>
  </div>
  <div class="header"><h1>🍽️ 今天吃什么</h1><p>命运的转盘会给你答案</p></div>
  <div class="wheel-wrapper"><div class="pointer"></div><canvas id="wheel" width="680" height="680"></canvas></div>
  <div class="controls">
    <button class="btn btn-spin" id="spinBtn">🎯 转一转</button>
    <button class="btn btn-edit" id="editBtn">✏️ 编辑菜单</button>
  </div>
  <div class="result">
    <div class="result-text" id="resultText">
      <span class="result-emoji" id="resultEmoji">🤔</span>
      <span id="resultLabel">登录后开始转转盘吧</span>
    </div>
  </div>
  <div class="history-section" id="historySection" style="display:none">
    <div class="history-header"><h3>📋 抽签历史</h3><button class="btn-clear" onclick="clearHistory()">清空</button></div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>
<canvas id="celebrationCanvas"></canvas>
<div class="modal-overlay" id="editOverlay">
  <div class="modal">
    <h2>✏️ 编辑菜单</h2>
    <div id="editList"></div>
    <button class="btn-add" onclick="addItem()">＋ 添加菜品</button>
    <div class="edit-actions">
      <button class="btn btn-cancel-modal" onclick="closeEdit()">取消</button>
      <button class="btn btn-save" onclick="saveEdit()">保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="authOverlay">
  <div class="modal" style="max-width:400px">
    <h2>🍽️ 今天吃什么</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')" id="tabLogin">登录</div>
      <div class="auth-tab" onclick="switchAuthTab('register')" id="tabRegister">注册</div>
    </div>
    <div id="authForm">
      <div class="auth-field"><label>用户名</label><input type="text" id="authUsername" placeholder="输入用户名" maxlength="20" autocomplete="username"></div>
      <div class="auth-field"><label>密码</label><input type="password" id="authPassword" placeholder="输入密码" maxlength="50" autocomplete="current-password"></div>
      <div class="auth-error" id="authError"></div>
      <button class="btn btn-spin btn-auth" id="authBtn" onclick="submitAuth()">登录</button>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  const COLORS = ['#FF6B6B','#4ECDC4','#FFB347','#5B86E5','#A68CDE','#F7DC6F','#82CCDD','#E56B9D'];
  const DARK_TEXT_COLORS = ['#F7DC6F','#FFB347','#82CCDD','#A68CDE'];
  const EMOJI_OPTIONS = ['🥟','🍜','🥗','🍱','🐟','🍗','🍣','🥩','🥘','🍲','🍝','🌮','🌯','🫔','🥪','🧆','🍳','🥓','🍔','🌭','🧁','🍰','🎂','🍨','🍩','🍪','☕','🧋','🥤','🍺','🍷','🥃','🍵','🧃','🍙','🌽','🥨','🥖'];

  let items = ['麻辣烫','牛肉面','轻食沙拉','日料定食','酸菜鱼','黄焖鸡','螺蛳粉','广式茶点'];
  let colors = [...COLORS];
  let emojis = ['🥟','🍜','🥗','🍱','🐟','🍗','🍣','🥩'];
  let currentAngle = 0, spinning = false, history = [];
  let token = localStorage.getItem('lunchToken'), username = '', authMode = 'login';

  const canvas = document.getElementById('wheel'), ctx = canvas.getContext('2d');
  const DPR = window.devicePixelRatio || 1, size = 340;
  canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
  canvas.width = size * DPR; canvas.height = size * DPR; ctx.scale(DPR, DPR);

  function apiHeaders() { return { 'Content-Type': 'application/json', 'Authorization': token ? 'Bearer ' + token : '' }; }
  async function api(path, method, body) {
    const opts = { method, headers: apiHeaders() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(API + path, opts);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '请求失败');
    return data;
  }

  function showAuthModal() { document.getElementById('authOverlay').classList.add('active'); }
  function hideAuthModal() { document.getElementById('authOverlay').classList.remove('active'); }
  function showAuthError(msg) { const e = document.getElementById('authError'); e.textContent = msg; e.style.display = 'block'; }
  function hideAuthError() { document.getElementById('authError').style.display = 'none'; }

  function switchAuthTab(mode) {
    authMode = mode;
    document.getElementById('tabLogin').className = 'auth-tab' + (mode==='login'?' active':'');
    document.getElementById('tabRegister').className = 'auth-tab' + (mode==='register'?' active':'');
    document.getElementById('authBtn').textContent = mode==='login'?'登录':'注册';
    hideAuthError();
  }

  async function submitAuth() {
    const u = document.getElementById('authUsername').value.trim();
    const p = document.getElementById('authPassword').value;
    if (!u||!p) { showAuthError('请填写用户名和密码'); return; }
    const btn = document.getElementById('authBtn'); btn.disabled = true;
    btn.textContent = authMode==='login'?'登录中...':'注册中...'; hideAuthError();
    try {
      const data = await api('/api/'+authMode, 'POST', { username: u, password: p });
      token = data.token; username = data.username;
      localStorage.setItem('lunchToken', token); hideAuthModal();
      document.getElementById('authUsername').value = ''; document.getElementById('authPassword').value = '';
      await loadUserData(); updateUserBar();
    } catch(e) { showAuthError(e.message); }
    finally { btn.disabled = false; btn.textContent = authMode==='login'?'登录':'注册'; }
  }

  function logout() {
    token = null; username = ''; localStorage.removeItem('lunchToken'); updateUserBar();
    items = ['麻辣烫','牛肉面','轻食沙拉','日料定食','酸菜鱼','黄焖鸡','螺蛳粉','广式茶点'];
    colors = [...COLORS]; emojis = ['🥟','🍜','🥗','🍱','🐟','🍗','🍣','🥩']; history = [];
    currentAngle = 0; drawWheel(0);
    document.getElementById('resultText').classList.remove('show');
    document.getElementById('resultLabel').textContent = '登录后开始转转盘吧';
    document.getElementById('historySection').style.display = 'none';
  }

  function updateUserBar() {
    document.getElementById('userDisplay').style.display = token?'inline':'none';
    document.getElementById('guestDisplay').style.display = token?'none':'inline';
    document.getElementById('userName').textContent = username;
  }

  function requireAuth(fn) {
    return function() { if(!token) { showAuthModal(); return; } return fn.apply(this, arguments); };
  }

  (function() {
    document.getElementById('spinBtn').onclick = function(){ requireAuth(spin)(); };
    document.getElementById('editBtn').onclick = function(){ requireAuth(openEdit)(); };
  })();

  async function loadUserData() {
    try {
      const [m, h] = await Promise.all([api('/api/menu','GET'), api('/api/history','GET')]);
      items = m.items; colors = m.colors; emojis = m.emojis;
      history = h.map(r => ({ item: r.item, time: r.created_at }));
      currentAngle = 0; drawWheel(0);
      document.getElementById('resultLabel').textContent = '点击转盘试试手气';
      renderHistory();
    } catch(e) { console.error('Failed to load:', e); }
  }

  function drawWheel(rotation) {
    const cx=size/2, cy=size/2, r=size/2-8, count=items.length, slice=(2*Math.PI)/count;
    ctx.clearRect(0,0,size,size);
    ctx.beginPath(); ctx.arc(cx,cy,r+4,0,2*Math.PI); ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.fill();
    for(let i=0;i<count;i++){
      const start=rotation+i*slice-Math.PI/2, end=start+slice;
      ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath();
      ctx.fillStyle=colors[i%colors.length]; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2; ctx.stroke();
      const angle=start+slice/2, labelR=r*0.62, x=cx+Math.cos(angle)*labelR, y=cy+Math.sin(angle)*labelR;
      ctx.save(); ctx.translate(x,y);
      ctx.rotate(angle+(angle>Math.PI/2&&angle<3*Math.PI/2?Math.PI:0));
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.font='bold 20px "Noto Sans SC",sans-serif'; ctx.fillText(emojis[i%emojis.length],0,-14);
      let fs=14; if(items[i].length>4) fs=12; if(items[i].length>6) fs=10;
      ctx.font='bold '+fs+'px "Noto Sans SC",sans-serif';
      ctx.fillStyle=(!DARK_TEXT_COLORS.includes(colors[i%colors.length])&&i%colors.length!==2)?'#fff':'#333';
      ctx.fillText(items[i],0,12); ctx.restore();
    }
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,30); g.addColorStop(0,'#fff'); g.addColorStop(1,'#f0f0f0');
    ctx.beginPath(); ctx.arc(cx,cy,24,0,2*Math.PI); ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=2; ctx.stroke();
    ctx.fillStyle='#666'; ctx.font='bold 16px "Noto Sans SC",sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('🍽️',cx,cy);
  }

  function getResult(rotation) {
    const count=items.length, slice=(2*Math.PI)/count;
    const n=((rotation%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
    const o=((2*Math.PI-n)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
    return Math.floor(o/slice)%count;
  }

  async function showResult(idx) {
    const el=document.getElementById('resultText'), em=document.getElementById('resultEmoji'), lb=document.getElementById('resultLabel');
    em.textContent=emojis[idx%emojis.length]; lb.textContent='今天吃：'+items[idx]+' 🎉';
    el.classList.add('show'); startCelebration();
    try {
      await api('/api/history','POST',{item:items[idx]});
      const d=new Date(), ds=d.toLocaleDateString('zh-CN',{month:'2-digit',day:'2-digit'});
      const ts=d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
      history.unshift({item:items[idx],time:ds+' '+ts}); renderHistory();
    } catch(e) { console.error('save history failed:', e); }
  }

  function spin() {
    if(spinning||items.length===0) return; spinning=true;
    const btn=document.getElementById('spinBtn'); btn.disabled=true; btn.textContent='🌀 转动中...';
    document.getElementById('resultText').classList.remove('show');
    const extra=5+Math.random()*4, dest=Math.random()*2*Math.PI;
    const total=currentAngle+extra*2*Math.PI+dest, startA=currentAngle;
    const dur=4000+Math.random()*1000, t0=performance.now();
    function ec(t){return 1-Math.pow(1-t,3);}
    function eb(t){const c=1.7;return 1+c*Math.pow(t-1,3)+c*Math.pow(t-1,2);}
    function anim(time){
      const el=time-t0, p=Math.min(el/dur,1);
      const e=p<0.97?ec(p/0.97):0.97+0.03*eb((p-0.97)/0.03);
      const a=startA+(total-startA)*e; currentAngle=a; drawWheel(a);
      if(p<1) requestAnimationFrame(anim);
      else {
        currentAngle=total; drawWheel(total); spinning=false;
        btn.disabled=false; btn.textContent='🎯 转一转';
        setTimeout(()=>showResult(getResult(total)),300);
      }
    }
    requestAnimationFrame(anim);
  }

  function openEdit() {
    const overlay=document.getElementById('editOverlay'), list=document.getElementById('editList'); list.innerHTML='';
    items.forEach((item,i)=>{
      const div=document.createElement('div'); div.className='edit-item';
      const es=document.createElement('select'); es.className='edit-emoji';
      EMOJI_OPTIONS.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;if(e===emojis[i%emojis.length])o.selected=true;es.appendChild(o);});
      const ci=document.createElement('input');ci.type='color';ci.className='edit-color';ci.value=colors[i];
      const ti=document.createElement('input');ti.type='text';ti.value=item;ti.placeholder='输入菜名...';
      div.appendChild(es);div.appendChild(ci);div.appendChild(ti);list.appendChild(div);
    });
    overlay.classList.add('active');
  }
  function closeEdit() { document.getElementById('editOverlay').classList.remove('active'); }

  function addItem() {
    const list=document.getElementById('editList'), div=document.createElement('div'); div.className='edit-item';
    const es=document.createElement('select'); es.className='edit-emoji';
    EMOJI_OPTIONS.forEach(e=>{const o=document.createElement('option');o.value=e;o.textContent=e;es.appendChild(o);});
    const ci=document.createElement('input');ci.type='color';ci.className='edit-color';ci.value='#'+Math.floor(Math.random()*0xffffff).toString(16).padStart(6,'0');
    const ti=document.createElement('input');ti.type='text';ti.value='';ti.placeholder='输入菜名...';

  async function saveEdit() {
    const tis=document.querySelectorAll('#editList input[type="text"]'), cis=document.querySelectorAll('#editList input[type="color"]'), ess=document.querySelectorAll('#editList select.edit-emoji');
    const ni=[], nc=[], ne=[];
    tis.forEach((inp,i)=>{const v=inp.value.trim();if(v){ni.push(v);nc.push(cis[i].value);ne.push(ess[i].value);}});
    if(ni.length<2){alert('至少需要 2 个菜品！');return;}
    try {
      await api('/api/menu','PUT',{items:ni,colors:nc,emojis:ne});
      items=ni;colors=nc;emojis=ne;currentAngle=0;drawWheel(0);
      document.getElementById('resultText').classList.remove('show');closeEdit();
    } catch(e){alert('保存失败：'+e.message);}
  }

  function renderHistory() {
    const s=document.getElementById('historySection'), l=document.getElementById('historyList');
    if(history.length===0){s.style.display='none';return;}
    s.style.display='block';l.innerHTML='';
    history.forEach(h=>{const d=document.createElement('div');d.className='history-item';d.textContent=h.time+' '+h.item;l.appendChild(d);});
  }

  async function clearHistory() {
    if(!confirm('确定清空所有抽签记录？'))return;
    try{await api('/api/history','DELETE');history=[];renderHistory();}catch(e){alert('清空失败');}
  }
